name: test-coverage

on:
  push:
    branches: [main, master, pre-release]
  pull_request:
    branches: [main, master, pre-release]

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: '4.6'}

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Cache R packages
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-cache-v2-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-cache-v2-

      # Cache JAGS installation (Windows)
      - name: Cache JAGS (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Program Files\JAGS
          key: ${{ runner.os }}-jags-4.3.1
          restore-keys: |
            ${{ runner.os }}-jags-

      # Install JAGS on Windows
      - name: Install JAGS (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "C:\Program Files\JAGS\JAGS-4.3.1\bin\jags-terminal.exe" (
            echo "JAGS not found in cache, downloading and installing..."
            curl -o jags-installer.exe -L https://sourceforge.net/projects/mcmc-jags/files/JAGS/4.x/Windows/JAGS-4.3.1.exe/download
            jags-installer.exe /S
            del jags-installer.exe
          ) else (
            echo "JAGS found in cache, skipping installation"
          )

      # Set JAGS environment variables on Windows
      - name: Set JAGS environment variables (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo JAGS_ROOT=C:\Program Files\JAGS\JAGS-4.3.1>> %GITHUB_ENV%
          echo JAGS_MAJOR_VERSION=4>> %GITHUB_ENV%
          echo PATH=C:\Program Files\JAGS\JAGS-4.3.1\bin;%PATH%>> %GITHUB_ENV%

      # Install the package
      - name: Install the required packages
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          
          # Check if packages are already installed before installing
          required_packages <- c('devtools', 'rcmdcheck', 'BayesFactor', 'RoBMA', 'runjags', 'rjags', 'rstan', 'scales', 'vdiffr', 'testthat', 'covr', 'knitr', 'rmarkdown')
          missing_packages <- required_packages[!sapply(required_packages, requireNamespace, quietly = TRUE)]
          
          if (length(missing_packages) > 0) {
            cat("Installing missing packages:", paste(missing_packages, collapse = ", "), "\n")
            install.packages(missing_packages)
          } else {
            cat("All required packages are already installed\n")
          }
          
          devtools::install()
        shell: Rscript {0}

      # Run the coverage check
      - name: Test coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          # This workflow is coverage-only. It intentionally runs the full
          # developer profile on push/PR; ordinary CI defaults to unit tests.
          BAYESTOOLS_TEST_PROFILE: "all"
          JAGS_ROOT: "/c/progra~1/JAGS/JAGS-4.3.1"
          JAGS_MAJOR_VERSION: 4
        run: |
          # Run every developer profile so slow model-fitting and figure tests
          # both contribute to coverage. tools/test-profile.R owns profile
          # environment setup and the LLM-oriented testthat reporter.
          # Use forward-slash paths on Windows; covr injects these paths into
          # instrumented R code, where backslashes can become invalid escapes.
          repo_path <- normalizePath(".", winslash = "/", mustWork = TRUE)
          on.exit(unlink(file.path(repo_path, "tests/testthat/_snaps"), recursive = TRUE, force = TRUE), add = TRUE)
          install_path <- normalizePath(file.path(Sys.getenv("RUNNER_TEMP"), "R_LIBS"), winslash = "/", mustWork = FALSE)
          unlink(install_path, recursive = TRUE, force = TRUE)
          
          coverage <- covr::package_coverage(
            path = repo_path,
            type = "none",
            quiet = FALSE,
            clean = FALSE,
            install_path = install_path,
            code = c(
              "repo_path <- normalizePath('.', winslash = '/', mustWork = TRUE)",
              "setwd(repo_path)",
              "source(file.path(repo_path, 'tools', 'test-profile.R'))"
            )
          )
          covr::codecov(coverage = coverage)
        shell: Rscript {0}
      
      # Print test failure details if coverage fails
      - name: Show testthat output
        if: failure()
        shell: pwsh
        run: |
          $failFiles = Get-ChildItem -Path $env:RUNNER_TEMP -Recurse -Filter "testthat.Rout.fail" -ErrorAction SilentlyContinue
          if ($failFiles) {
            foreach ($file in $failFiles) {
              Write-Host "`n=== Contents of $($file.FullName) ===`n"
              Get-Content $file.FullName
            }
          } else {
            Write-Host "No testthat.Rout.fail files found in $env:RUNNER_TEMP"
          }

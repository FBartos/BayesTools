name: R-tests

on:
  push:
    branches: [main, master, pre-release]
  pull_request:
    branches: [main, master, pre-release]
  schedule:
    # Weekly full profile verification.
    - cron: '23 3 * * 1'
  release:
    types: [published, prereleased]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: '4.6'}
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      # Cache R packages
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-cache-v2-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-cache-v2-

      # Cache system dependencies
      - name: Cache system dependencies
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/R-test.yaml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      # Cache JAGS installation (Windows)
      - name: Cache JAGS (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Program Files\JAGS
          key: ${{ runner.os }}-jags-4.3.1
          restore-keys: |
            ${{ runner.os }}-jags-

      # Cache JAGS installation (macOS)  
      - name: Cache JAGS (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: /opt/homebrew
          key: ${{ runner.os }}-jags-${{ hashFiles('.github/workflows/R-test.yaml') }}
          restore-keys: |
            ${{ runner.os }}-jags-

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            jags

      - name: Install JAGS (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "C:\Program Files\JAGS\JAGS-4.3.1\bin\jags-terminal.exe" (
            echo "JAGS not found in cache, downloading and installing..."
            curl -o jags-installer.exe -L https://sourceforge.net/projects/mcmc-jags/files/JAGS/4.x/Windows/JAGS-4.3.1.exe/download
            jags-installer.exe /S
            del jags-installer.exe
          ) else (
            echo "JAGS found in cache, skipping installation"
          )

      - name: Set JAGS environment variables (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo JAGS_ROOT=C:\Program Files\JAGS\JAGS-4.3.1>> %GITHUB_ENV%
          echo JAGS_MAJOR_VERSION=4>> %GITHUB_ENV%
          echo PATH=C:\Program Files\JAGS\JAGS-4.3.1\bin;%PATH%>> %GITHUB_ENV%

      - name: Install JAGS (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v jags &> /dev/null; then
            echo "JAGS not found in cache, installing via brew..."
            brew update
            brew install jags
          else
            echo "JAGS found in cache, skipping installation"
          fi

      - name: Set Environment Variables (macOS)
        if: runner.os == 'macOS'
        run: |
          JAGS_BIN=$(brew --prefix jags)/bin
          echo "JAGS_ROOT=$(brew --prefix jags)" >> $GITHUB_ENV
          echo "PATH=$JAGS_BIN:$PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix jags)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Select Test Profile
        shell: pwsh
        run: |
          $profile = "all"

          "BAYESTOOLS_CI_PROFILE=$profile" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BAYESTOOLS_TEST_FILES_DIR=$env:RUNNER_TEMP\BayesTools_test_files" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Selected BayesTools test profile: $profile"

      - name: Install the required packages
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          
          # Check if packages are already installed before installing
          required_packages <- c('devtools', 'testthat', 'vdiffr', 'lme4', 'BayesFactor', 'RoBMA', 'runjags', 'rjags', 'rstan')
          missing_packages <- required_packages[!sapply(required_packages, requireNamespace, quietly = TRUE)]
          
          if (length(missing_packages) > 0) {
            cat("Installing missing packages:", paste(missing_packages, collapse = ", "), "\n")
            install.packages(missing_packages)
          } else {
            cat("All required packages are already installed\n")
          }
          
          devtools::install()
        shell: Rscript {0}

      - name: Run Test Profile
        shell: pwsh
        run: |
          Rscript tools/test-profile.R "$env:BAYESTOOLS_CI_PROFILE"

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bayestools-test-artifacts-${{ github.event_name }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/BayesTools_test_files
          if-no-files-found: ignore
          retention-days: 14
